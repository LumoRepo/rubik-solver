name: iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Grant execute permission for build-ios-framework.sh
        run: chmod +x rubik-solver/build-ios-framework.sh

      - name: Build min2phaseCXX XCFramework
        run: ./rubik-solver/build-ios-framework.sh

      # Verify Kotlin/Native compiles. The link+embed step runs inside xcodebuild
      # via embedAndSignAppleFrameworkForXcode (avoids the AGP9+KMP hard error
      # that assembleReleaseXCFramework triggers on full Android configuration).
      - name: Compile Kotlin/Native (iosArm64 + iosSimulatorArm64)
        run: ./gradlew :composeApp:compileKotlinIosArm64 :composeApp:compileKotlinIosSimulatorArm64 :rubik-solver:compileKotlinIosArm64 :rubik-solver:compileKotlinIosSimulatorArm64

      # Build for iOS Simulator — no code signing required.
      # xcodebuild triggers the "Run Gradle Build" phase which calls
      # embedAndSignAppleFrameworkForXcode with the correct Xcode env vars,
      # linking the Kotlin framework and placing it where Xcode expects it.
      - name: Build iOS app (simulator)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -arch arm64 \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-simulator
          path: build/Build/Products/Debug-iphonesimulator/iosApp.app
          if-no-files-found: warn

      # ── Device IPA (optional) ──────────────────────────────────────────────
