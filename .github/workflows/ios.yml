      #   APPLE_CERTIFICATE_PASSWORD – p12 export password
      #   APPLE_PROVISIONING_PROFILE – .mobileprovision file, base64-encoded
      #
      # Uncomment the steps below and add those secrets to enable device builds.
      # -----------------------------------------------------------------------
