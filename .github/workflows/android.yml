name: Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :rubik-model:jvmTest :rubik-vision:testDebugUnitTest

      - name: Install consistent debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/debug.keystore"

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk

      # Distribute to Firebase App Distribution on pushes to main only.
      # Requires FIREBASE_SERVICE_ACCOUNT_JSON secret (contents of the
      # service account JSON file from the Firebase console).
      - name: Distribute to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > composeApp/xmelon-rubik-solver-firebase-admin.json
          ./gradlew :composeApp:appDistributionUploadDebug
